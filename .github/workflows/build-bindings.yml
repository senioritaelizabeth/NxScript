name: Build Bindings

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            c_lib: libNxScript.so
            gd_lib: libNxScriptGD.so
            artifact: nxscript-linux-x64

          - os: windows-latest
            platform: windows-x64
            c_lib: NxScript.dll
            gd_lib: NxScriptGD.dll
            artifact: nxscript-windows-x64

          - os: macos-latest
            platform: macos-arm64
            c_lib: libNxScript.dylib
            gd_lib: libNxScriptGD.dylib
            artifact: nxscript-macos-arm64

    steps:
      - name: Checkout NxScript
        uses: actions/checkout@v4
        with:
          path: NxScript

      - name: Checkout NxScript.Outbindings
        uses: actions/checkout@v4
        with:
          repository: Kitsumizy/NxScript.Outbindings
          path: NxScript.Outbindings
          token: ${{ secrets.OUTBINDING_TOKEN }}

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.4"

      - name: Install hxcpp
        run: haxelib install hxcpp --quiet

      - name: Register NxScript source with haxelib
        run: haxelib dev nxscript NxScript/src

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get install -y gcc g++ make

      # ── C binding ────────────────────────────────────────────────────
      - name: Build C binding
        working-directory: NxScript.Outbindings/c
        run: haxe c_binding.hxml

      - name: Collect C lib
        shell: bash
        run: |
          mkdir -p dist/c
          find NxScript.Outbindings/c/out -maxdepth 4 \
            \( -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) \
            | head -1 | xargs -I{} cp {} dist/c/${{ matrix.c_lib }} 2>/dev/null || true
          cp NxScript.Outbindings/c/nxscript.h dist/c/
          ls -lh dist/c/

      # ── GDExtension binding ──────────────────────────────────────────
      - name: Build GDExtension binding
        working-directory: NxScript.Outbindings/gdextension
        run: haxe gdext_binding.hxml

      - name: Collect GDExtension lib
        shell: bash
        run: |
          mkdir -p dist/gdextension
          find NxScript.Outbindings/gdextension/out -maxdepth 4 \
            \( -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) \
            | head -1 | xargs -I{} cp {} dist/gdextension/${{ matrix.gd_lib }} 2>/dev/null || true
          cp NxScript.Outbindings/gdextension/NxScriptGDExt.cpp    dist/gdextension/
          cp NxScript.Outbindings/gdextension/nxscript.gdextension dist/gdextension/ 2>/dev/null || true
          ls -lh dist/gdextension/

      - name: Copy shared files
        shell: bash
        run: |
          cp NxScript.Outbindings/unity/NxScriptUnity.cs dist/
          cp NxScript.Outbindings/README.md               dist/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: 30
