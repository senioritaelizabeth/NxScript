name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7
      - name: Set dev to current lib
        run: haxe dev nxscript .
      - name: Run all Tests
        working-directory: test/tests
        run: haxe test_suite.hxml

      # - name: Run Methods Tests
      #   working-directory: test/tests
      #   run: haxe methods.hxml

      # - name: Run Classes Tests
      #   working-directory: test/tests
      #   run: haxe classes.hxml

      # - name: Run Error Format Tests
      #   working-directory: test/tests
      #   run: haxe errors.hxml

      # - name: Run Import Compatibility Tests
      #   working-directory: test/tests
      #   run: haxe imports.hxml

  docs-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install dox
        run: |
          yes | haxelib install dox
      - name: Install prismcli
        run: |
          yes | haxelib install prismcli
      - name: Prepare dox CommonJS compatibility
        shell: bash
        run: |
          HAXELIB_ROOT="$(haxelib config | tr -d '\r')"
          DOX_DIR="$(ls -d "$HAXELIB_ROOT"/dox/* 2>/dev/null | sort | tail -n1)"
          if [ -n "$DOX_DIR" ] && [ ! -f "$DOX_DIR/package.json" ]; then
            echo '{"type":"commonjs"}' > "$DOX_DIR/package.json"
          fi

      - name: Generate XML docs
        run: haxe doc.hxml

      - name: Build HTML docs (validation)
        run: haxelib run dox -i doc.xml -o docs-ci --title "NxScript" --include "nz"
