name: Publish Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install dox
        run: |
          yes | haxelib install dox

      - name: Prepare dox CommonJS compatibility
        shell: bash
        run: |
          HAXELIB_ROOT="$(haxelib config | tr -d '\r')"
          DOX_DIR="$(ls -d "$HAXELIB_ROOT"/dox/* 2>/dev/null | sort | tail -n1)"
          if [ -n "$DOX_DIR" ] && [ ! -f "$DOX_DIR/package.json" ]; then
            echo '{"type":"commonjs"}' > "$DOX_DIR/package.json"
          fi

      - name: Generate XML docs
        run: haxe doc.hxml

      - name: Build HTML docs
        run: haxelib run dox -i doc.xml -o docs/ --title "NxScript" --include "nz"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
