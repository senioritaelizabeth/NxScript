name: Nightly Minimal

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-nightly-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Force update nightly branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:nightly --force

  minimal-checks:
    runs-on: ubuntu-latest
    needs: sync-nightly-branch

    steps:
      - name: Checkout nightly
        uses: actions/checkout@v4
        with:
          ref: nightly

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Basic tests only
        working-directory: test/tests
        run: haxe basic.hxml

      - name: Methods tests only
        working-directory: test/tests
        run: haxe methods.hxml

      - name: Build VSCode extension
        working-directory: nxscript-vsext
        run: |
          npm ci
          npm run compile
